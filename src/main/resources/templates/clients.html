<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Клиенты</title>
</head>
<body>
    <h1>Клиенты</h1>
    <div>
        <a href="/cards">Перейти к картам</a>
        |
        <a href="/clients/new">Добавить клиента</a>
    </div>

    <hr>

    <h2>Поиск клиентов</h2>
    <form th:action="@{/clients/search}" method="post">
        <label>
            Поиск по имени
            <input type="text" name="searchTerm" placeholder="Найти" th:value="${searchName}">
        </label>
        <button type="submit">Найти</button>
    </form>

    <hr>

    <h2>Список клиентов</h2>
    <table>
        <tr>
            <th>ID</th>
            <th>Имя</th>
            <th>Дата рождения</th>
        </tr>

        <tr th:each="client : ${clients}" th:unless="${#lists.isEmpty(clients)}">
            <td th:text="${client.id}">1</td>
            <td th:text="${client.fullName}">No client</td>
            <td th:text="${client.birthDate}">2000-01-01</td>
        </tr>
    </table>

</body>
</html>
