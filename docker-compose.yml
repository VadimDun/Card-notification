version: '3.8'

services:

  postgres:
    image: postgres:15
    container_name: card-notification-db

    environment:
      POSTGRES_DB: card_notification_db
      POSTGRES_USER: carduser
      POSTGRES_PASSWORD: cardpass

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data


  card-app:
    build: .
    container_name: card-notification-app

    ports:
      - "8080:8080"

    depends_on:
      - postgres

  card-ui:
    build: ./frontend
    container_name: card-notification-ui

    ports:
      - "3000:80"

    depends_on:
      - card-app

volumes:
  postgres-data: